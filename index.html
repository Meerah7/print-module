<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Print Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header>
        <h1>Print</h1>
        
    </header>

    <div class="main">

        <!-- LEFT: OPTIONS -->
        <div class="card">

            <h3>Upload Document</h3>
            <input type="file" id="fileInput" accept="application/pdf" />
            <p id="fileName"></p>
            <p id="pageCount"></p>

            <h3>Print Settings</h3>

            <label>Print Type</label>
            <select id="printType">
                <option value="bw">Black & White</option>
                <option value="color">Color</option>
            </select>

            <label>Copies</label>
            <input type="number" id="copies" value="1" min="1" />

            <label>Pages to Print</label>
<input type="text" id="pageRange" placeholder="e.g. 1-3,5 or leave empty for all pages">
<small>Enter pages like: 1-3,5</small>

            <div class="price-box">
                <p id="price">₹0</p>
                <span>Total Price</span>
            </div>

            <button onclick="saveOrder()">Save Order</button>

        </div>

        <!-- RIGHT: PREVIEW -->
        <div class="preview-section">
            <h3>Document Preview</h3>
            <div class="preview">
<div id="pdfContainer"></div>            </div>
        </div>

    </div>

</div>

<!-- ✅ PDF.js (IMPORTANT) -->
<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js"></script>

<!-- ✅ Your Script -->
<script src="script.js"></script>

</body>
</html>
